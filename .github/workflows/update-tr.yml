name: 📈 Atualizar TR Mensal (BCB Série 226)

# Roda no dia 5 de cada mês às 10h UTC (07h Brasília)
# O BCB costuma publicar a TR até o dia 4.
# Também pode ser acionado manualmente no GitHub → Actions → Run workflow.
on:
  schedule:
    - cron: '0 10 5 * *'
  workflow_dispatch:

jobs:
  update-tr:
    name: Buscar TR no BCB e atualizar calculos.ts
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessário para fazer commit e push

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js (o script não precisa de dependências externas)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Executa o script de atualização
      - name: Atualizar TR
        run: node scripts/update-tr.js

      # 4. Faz commit apenas se o arquivo foi alterado
      - name: Commit e push (se houver alterações)
        run: |
          git config user.name  "tr-bot[bot]"
          git config user.email "tr-bot@financiecerto.com.br"

          if git diff --quiet lib/calculos.ts; then
            echo "ℹ️  Nenhuma alteração detectada — nada a commitar."
          else
            MES=$(date +'%b/%Y' --locale=pt_BR 2>/dev/null || date +'%b/%Y')
            git add lib/calculos.ts
            git commit -m "chore(tr): atualizar TR histórica BCB — ${MES}"
            git push
            echo "✅ Commit realizado e push enviado."
          fi

name: 🖼️ Verificar Fotos dos Imóveis

# Toda segunda-feira às 07h UTC (04h Brasília)
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  check-photos:
    name: Escanear catálogo e detectar fotos quebradas
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar fotos via catálogo público
        id: scan
        run: |
          node - <<'EOF'
          const https = require('https');
          const http  = require('http');

          const SITE = 'https://www.financiecerto.com.br';
          const MAX_IMOVEIS  = 100;   // amostra do catálogo
          const MAX_PHOTOS   = 3;     // fotos testadas por imóvel
          const TIMEOUT_MS   = 8000;

          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              const lib = url.startsWith('https') ? https : http;
              lib.get(url, { headers: { 'User-Agent': 'financiecerto-photo-check/1.0' } }, res => {
                let raw = '';
                res.on('data', c => raw += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(raw)); } catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function checkUrl(url) {
            return new Promise(resolve => {
              const lib     = url.startsWith('https') ? https : http;
              const timeout = setTimeout(() => { resolve({ ok: false, status: 'timeout' }); }, TIMEOUT_MS);
              try {
                const req = lib.request(url, { method: 'HEAD', headers: { 'User-Agent': 'financiecerto-photo-check/1.0' } }, res => {
                  clearTimeout(timeout);
                  resolve({ ok: res.statusCode < 400, status: res.statusCode });
                });
                req.on('error', () => { clearTimeout(timeout); resolve({ ok: false, status: 'error' }); });
                req.end();
              } catch(e) {
                clearTimeout(timeout); resolve({ ok: false, status: 'error' });
              }
            });
          }

          async function main() {
            console.log('Buscando catálogo...');
            let catalog;
            try {
              catalog = await fetchJSON(`${SITE}/api/orulo/catalog`);
            } catch(e) {
              console.error('Erro ao buscar catálogo:', e.message);
              process.exit(0); // não cria issue se catálogo indisponível
            }

            const imoveis = Array.isArray(catalog) ? catalog : (catalog.buildings || catalog.data || []);
            const amostra = imoveis.slice(0, MAX_IMOVEIS);
            console.log(`Testando ${amostra.length} imóveis (de ${imoveis.length} total)...`);

            const problemas = [];

            for (const im of amostra) {
              const fotos = (im.photos || []).slice(0, MAX_PHOTOS);
              if (!fotos.length) continue;

              const results = await Promise.all(fotos.map(checkUrl));
              const quebradas = fotos.filter((_, i) => !results[i].ok);

              if (quebradas.length > 0) {
                problemas.push({
                  id:        im.id,
                  nome:      im.name || im.nome || im.id,
                  bairro:    im.neighborhood || im.bairro || '—',
                  totalFotos: fotos.length,
                  quebradas:  quebradas.length,
                });
              }
            }

            console.log(`\nResultado: ${problemas.length} imóveis com fotos quebradas (em ${amostra.length} verificados)`);

            if (problemas.length === 0) {
              console.log('✅ Nenhum problema encontrado.');
              process.exit(0);
            }

            // Gera markdown para a issue
            const linhas = problemas
              .slice(0, 30)
              .map(p => `| [${p.nome}](${SITE}/imoveis/${p.id}) | ${p.bairro} | ${p.quebradas}/${p.totalFotos} |`)
              .join('\n');

            const body = [
              '## Fotos quebradas detectadas no catálogo',
              '',
              `Escaneamento de **${amostra.length} imóveis** realizado em ${new Date().toLocaleDateString('pt-BR')}.`,
              '',
              '| Empreendimento | Bairro | Fotos quebradas |',
              '|----------------|--------|----------------|',
              linhas,
              '',
              problemas.length > 30 ? `_...e mais ${problemas.length - 30} empreendimentos_` : '',
              '',
              '**O que fazer:**',
              '- Fotos quebradas são ocultadas automaticamente no site (não aparecem para o usuário)',
              '- Se um empreendimento ficou sem nenhuma foto, vale verificar no painel Orulo',
              '- A sincronização diária (04h UTC) deve atualizar URLs expiradas automaticamente',
              '',
              '_Gerado pelo workflow `check-photos.yml`_',
            ].join('\n');

            // Salva para o próximo step
            const fs = require('fs');
            fs.writeFileSync('/tmp/photo-report.json', JSON.stringify({ count: problemas.length, body }));
            console.log('Relatório salvo em /tmp/photo-report.json');
          }

          main().catch(e => { console.error(e); process.exit(0); });
          EOF

      - name: Criar issue se houver problemas
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('/tmp/photo-report.json')) {
              console.log('Nenhum problema encontrado — issue não criada.');
              return;
            }
            const { count, body } = JSON.parse(fs.readFileSync('/tmp/photo-report.json', 'utf8'));
            const today = new Date().toLocaleDateString('pt-BR');

            // Fecha issues antigas do mesmo tipo
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'fotos',
              state: 'open',
            });
            for (const issue of openIssues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🖼️ ${count} imóveis com fotos quebradas — ${today}`,
              body,
              labels: ['fotos', 'manutenção'],
            });
            console.log(`Issue criada: ${count} imóveis com problemas.`);
